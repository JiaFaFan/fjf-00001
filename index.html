<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吉卜力节拍器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #fdf6e3 0%, #fef3d7 30%, #ffe8c9 60%, #f8e0c2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .bg-scenery {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            opacity: 0.7;
        }

        .cloud-1 {
            top: 6%;
            left: -2%;
            width: 200px;
            animation: floatCloud 22s ease-in-out infinite;
        }

        .cloud-2 {
            top: 12%;
            right: 5%;
            width: 160px;
            animation: floatCloud 28s ease-in-out infinite reverse;
            animation-delay: -5s;
        }

        .cloud-3 {
            top: 25%;
            left: 30%;
            width: 120px;
            opacity: 0.5;
            animation: floatCloud 35s ease-in-out infinite;
            animation-delay: -12s;
        }

        @keyframes floatCloud {
            0%, 100% { transform: translateX(0) translateY(0); }
            33% { transform: translateX(15px) translateY(-8px); }
            66% { transform: translateX(-10px) translateY(5px); }
        }

        .hills {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
        }

        .metronome-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            padding: 36px 24px 44px;
            background: rgba(255, 252, 245, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 42px;
            border: 2.5px solid rgba(196, 162, 112, 0.35);
            box-shadow:
                0 12px 40px rgba(139, 102, 58, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .title {
            font-family: 'ZCOOL KuaiLe', 'Ma Shan Zheng', cursive;
            font-size: 32px;
            font-weight: 400;
            color: #6b4f2d;
            letter-spacing: 8px;
            text-shadow: 1px 2px 0 rgba(255, 255, 255, 0.5);
        }

        .beat-visual {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 4px 0;
        }

        .beat-track {
            position: absolute;
            width: calc(100% - 8px);
            height: 10px;
            background: linear-gradient(90deg,
                rgba(184, 145, 90, 0.28) 0%,
                rgba(184, 145, 90, 0.4) 50%,
                rgba(184, 145, 90, 0.28) 100%);
            border-radius: 5px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow:
                inset 0 2px 4px rgba(139, 102, 58, 0.15),
                0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .endpoint {
            position: absolute;
            top: 50%;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #c79868 0%, #a37a4d 100%);
            transform: translateY(-50%);
            box-shadow:
                0 2px 6px rgba(139, 102, 58, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            z-index: 1;
        }

        .endpoint-left {
            left: -4px;
        }

        .endpoint-right {
            right: -4px;
        }

        .ripple {
            position: absolute;
            top: 50%;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: none;
            opacity: 0;
            z-index: 0;
        }

        .ripple-left {
            left: 5px;
        }

        .ripple-right {
            right: 5px;
            left: auto;
        }

        .ripple-right.animate {
            animation: rippleExpandRight 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes rippleExpandRight {
            0% {
                transform: translate(50%, -50%) scale(0.8);
                opacity: 0.7;
                box-shadow:
                    0 0 0 0 rgba(255, 140, 60, 0.55),
                    0 0 0 6px rgba(255, 160, 90, 0.35),
                    0 0 0 14px rgba(255, 180, 120, 0.2);
            }
            70% {
                opacity: 0.35;
            }
            100% {
                transform: translate(50%, -50%) scale(3.5);
                opacity: 0;
                box-shadow:
                    0 0 0 0 rgba(255, 140, 60, 0),
                    0 0 0 24px rgba(255, 160, 90, 0.12),
                    0 0 0 48px rgba(255, 180, 120, 0);
            }
        }

        .ripple.animate {
            animation: rippleExpand 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes rippleExpand {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.7;
                box-shadow:
                    0 0 0 0 rgba(255, 140, 60, 0.55),
                    0 0 0 6px rgba(255, 160, 90, 0.35),
                    0 0 0 14px rgba(255, 180, 120, 0.2);
            }
            70% {
                opacity: 0.35;
            }
            100% {
                transform: translate(-50%, -50%) scale(3.5);
                opacity: 0;
                box-shadow:
                    0 0 0 0 rgba(255, 140, 60, 0),
                    0 0 0 24px rgba(255, 160, 90, 0.12),
                    0 0 0 48px rgba(255, 180, 120, 0);
            }
        }

        .beat-dot {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: radial-gradient(circle at 32% 30%, #ffb366 0%, #f08838 45%, #d9702c 100%);
            box-shadow:
                0 8px 22px rgba(217, 112, 44, 0.45),
                inset 0 -3px 8px rgba(0, 0, 0, 0.1),
                inset 0 2px 4px rgba(255, 255, 255, 0.35);
            border: 3px solid rgba(180, 90, 30, 0.3);
            position: relative;
            z-index: 2;
            will-change: transform;
        }

        .beat-dot::after {
            content: '';
            position: absolute;
            top: 18%;
            left: 22%;
            width: 22%;
            height: 22%;
            background: rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            filter: blur(1px);
        }

        .bpm-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 16px 36px;
            background: rgba(255, 248, 232, 0.7);
            border-radius: 28px;
            border: 2px dashed rgba(184, 145, 90, 0.3);
        }

        .bpm-value {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 76px;
            font-weight: 400;
            color: #6b4f2d;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.4);
        }

        .bpm-label {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 16px;
            color: #a0824f;
            letter-spacing: 8px;
            padding-left: 8px;
        }

        .bpm-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-bpm {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 2.5px solid rgba(184, 145, 90, 0.4);
            background: radial-gradient(circle at 35% 30%, #ffe3a6 0%, #f5c46e 50%, #e8a84a 100%);
            color: #6b4f2d;
            font-size: 38px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s ease;
            user-select: none;
            box-shadow:
                0 5px 12px rgba(184, 145, 90, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            font-family: inherit;
            padding-bottom: 4px;
        }

        .btn-bpm:hover {
            box-shadow:
                0 7px 16px rgba(184, 145, 90, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .btn-bpm:active {
            transform: scale(0.90);
            box-shadow:
                0 2px 6px rgba(184, 145, 90, 0.2),
                inset 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .btn-toggle {
            width: 170px;
            height: 68px;
            border-radius: 34px;
            border: 2.5px solid rgba(92, 168, 110, 0.4);
            background: radial-gradient(circle at 35% 25%, #a7e5b4 0%, #6dcf82 50%, #4fb868 100%);
            color: white;
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 6px;
            padding-left: 6px;
            cursor: pointer;
            transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.25s ease, border-color 0.25s ease, box-shadow 0.15s ease;
            user-select: none;
            box-shadow:
                0 6px 16px rgba(92, 168, 110, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.35);
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.08);
        }

        .btn-toggle:hover {
            box-shadow:
                0 8px 20px rgba(92, 168, 110, 0.38),
                inset 0 1px 0 rgba(255, 255, 255, 0.35);
        }

        .btn-toggle.playing {
            background: radial-gradient(circle at 35% 25%, #ffb3a3 0%, #f08a78 50%, #e06852 100%);
            border-color: rgba(224, 104, 82, 0.45);
            box-shadow:
                0 6px 16px rgba(224, 104, 82, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.35);
        }

        .btn-toggle:active {
            transform: scale(0.95);
        }

        .hint {
            font-size: 12px;
            color: #b59870;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: -4px;
        }

        @media (min-width: 768px) {
            .metronome-container {
                max-width: 580px;
                gap: 36px;
                padding: 52px 48px 56px;
                border-radius: 54px;
            }

            .title {
                font-size: 38px;
                letter-spacing: 10px;
            }

            .beat-visual {
                height: 240px;
                margin: 12px 0;
            }

            .beat-track {
                height: 12px;
                width: calc(100% - 12px);
            }

            .endpoint {
                width: 22px;
                height: 22px;
            }

            .ripple {
                width: 22px;
                height: 22px;
            }

            .beat-dot {
                width: 80px;
                height: 80px;
            }

            .bpm-display {
                padding: 20px 48px;
                border-radius: 32px;
            }

            .bpm-value {
                font-size: 100px;
            }

            .bpm-label {
                font-size: 18px;
                letter-spacing: 10px;
            }

            .bpm-controls {
                gap: 28px;
            }

            .btn-bpm {
                width: 84px;
                height: 84px;
                font-size: 46px;
            }

            .btn-toggle {
                width: 210px;
                height: 84px;
                font-size: 26px;
                letter-spacing: 8px;
                border-radius: 42px;
            }

            .hint {
                font-size: 13px;
            }
        }

        @media (max-width: 360px) {
            .title {
                font-size: 26px;
                letter-spacing: 6px;
            }

            .bpm-value {
                font-size: 64px;
            }

            .btn-bpm {
                width: 60px;
                height: 60px;
                font-size: 32px;
            }

            .btn-toggle {
                width: 150px;
                height: 60px;
                font-size: 18px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-scenery" aria-hidden="true">
        <svg class="cloud cloud-1" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M45 70 Q25 70 25 55 Q25 40 42 38 Q42 22 62 20 Q72 8 88 12 Q102 4 116 14 Q132 8 142 22 Q162 22 166 40 Q182 44 178 62 Q176 76 158 76 L45 76 Z"
                  fill="#ffffff"
                  stroke="#e8d5b8"
                  stroke-width="2"
                  stroke-linejoin="round"
                  opacity="0.9"/>
        </svg>

        <svg class="cloud cloud-2" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 72 Q30 72 30 56 Q30 42 48 40 Q46 24 68 22 Q80 10 96 16 Q112 8 124 20 Q144 20 150 38 Q168 42 164 60 Q162 74 144 74 L50 74 Z"
                  fill="#ffffff"
                  stroke="#e8d5b8"
                  stroke-width="2"
                  stroke-linejoin="round"
                  opacity="0.85"/>
        </svg>

        <svg class="cloud cloud-3" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M55 74 Q40 74 40 62 Q40 52 52 50 Q52 40 66 38 Q74 32 84 36 Q94 30 104 40 Q116 38 122 50 Q132 52 130 62 Q128 72 118 72 L55 72 Z"
                  fill="#ffffff"
                  stroke="#e8d5b8"
                  stroke-width="1.5"
                  stroke-linejoin="round"/>
        </svg>

        <svg class="hills" viewBox="0 0 1600 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 380 Q200 300 400 340 Q600 380 800 310 Q1000 240 1200 300 Q1400 360 1600 290 L1600 500 L0 500 Z"
                  fill="#b8d8a8"
                  stroke="#9cc48a"
                  stroke-width="2"
                  opacity="0.7"/>
            <path d="M0 420 Q150 370 350 400 Q550 430 750 380 Q950 330 1150 380 Q1350 430 1600 370 L1600 500 L0 500 Z"
                  fill="#a4cf94"
                  stroke="#8cbf7a"
                  stroke-width="2"
                  opacity="0.8"/>
            <path d="M0 460 Q250 420 500 450 Q750 480 1000 440 Q1250 400 1600 450 L1600 500 L0 500 Z"
                  fill="#8ec57c"
                  stroke="#76b364"
                  stroke-width="2"/>
            <circle cx="120" cy="350" r="6" fill="#f4a7b9" opacity="0.6"/>
            <circle cx="340" cy="318" r="5" fill="#fff5a8" opacity="0.7"/>
            <circle cx="680" cy="288" r="7" fill="#f4a7b9" opacity="0.55"/>
            <circle cx="1120" cy="278" r="5" fill="#fff5a8" opacity="0.65"/>
            <circle cx="1450" cy="262" r="6" fill="#f4a7b9" opacity="0.6"/>
        </svg>
    </div>

    <div class="metronome-container">
        <h1 class="title">节 拍 器</h1>

        <div class="beat-visual">
            <div class="beat-track"></div>
            <div class="endpoint endpoint-left"></div>
            <div class="endpoint endpoint-right"></div>
            <div class="ripple ripple-left" id="rippleLeft"></div>
            <div class="ripple ripple-right" id="rippleRight"></div>
            <div class="beat-dot" id="beatDot"></div>
        </div>

        <div class="bpm-display">
            <div class="bpm-value" id="bpmValue">100</div>
            <div class="bpm-label">BPM</div>
        </div>

        <div class="bpm-controls">
            <button class="btn-bpm" id="btnMinus" aria-label="减少BPM">−</button>
            <button class="btn-toggle" id="btnToggle">开 始</button>
            <button class="btn-bpm" id="btnPlus" aria-label="增加BPM">+</button>
        </div>

        <div class="hint">长按按钮可快速调节 · 空格键开始/停止</div>
    </div>

    <script>
        const bpmValueEl = document.getElementById('bpmValue');
        const btnMinus = document.getElementById('btnMinus');
        const btnPlus = document.getElementById('btnPlus');
        const btnToggle = document.getElementById('btnToggle');
        const beatDot = document.getElementById('beatDot');

        const MIN_BPM = 40;
        const MAX_BPM = 200;
        let bpm = 100;
        let isPlaying = false;

        let audioCtx = null;
        let nextNoteTime = 0.0;
        let currentBeat = 0;
        let lookahead = 25.0;
        let scheduleAheadTime = 0.1;
        let schedulerTimer = null;
        const pendingBeats = [];

        function updateBPMDisplay() {
            bpmValueEl.textContent = bpm;
        }

        function secondsPerBeat() {
            return 60.0 / bpm;
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playClick(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.frequency.setValueAtTime(1600, time);
            osc.frequency.exponentialRampToValueAtTime(900, time + 0.04);

            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.7, time + 0.001);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);

            osc.start(time);
            osc.stop(time + 0.08);
        }

        function scheduleNote(beatNumber, time) {
            playClick(time);
            pendingBeats.push({
                beat: beatNumber,
                time: time
            });
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentBeat, nextNoteTime);
                nextNoteTime += secondsPerBeat();
                currentBeat++;
            }
            schedulerTimer = setTimeout(scheduler, lookahead);
        }

        const rippleLeft = document.getElementById('rippleLeft');
        const rippleRight = document.getElementById('rippleRight');

        let visualStartTime = 0;
        let lastTriggeredBeat = -1;

        function getSwingRange() {
            const containerWidth = beatDot.parentElement.clientWidth;
            const dotSize = window.innerWidth >= 768 ? 80 : 62;
            const endpointSize = window.innerWidth >= 768 ? 22 : 18;
            return (containerWidth - dotSize - endpointSize) / 2 - 6;
        }

        function triggerRipple(reachedSide) {
            const el = reachedSide === 1 ? rippleRight : rippleLeft;
            el.classList.remove('animate');
            void el.offsetWidth;
            el.classList.add('animate');
        }

        function visualLoop() {
            if (!isPlaying) return;

            const now = audioCtx.currentTime;
            const spb = secondsPerBeat();
            const swingRange = getSwingRange();

            const elapsed = now - visualStartTime;
            const totalBeatsElapsed = elapsed / spb;
            const currentBeatFloat = Math.max(0, totalBeatsElapsed);
            const beatIndex = Math.floor(currentBeatFloat);
            const progress = currentBeatFloat - beatIndex;

            if (beatIndex > lastTriggeredBeat && beatIndex >= 0) {
                const endWasRightSide = (beatIndex % 2 === 1);
                triggerRipple(endWasRightSide ? 1 : -1);
                lastTriggeredBeat = beatIndex;
            }

            const goingRight = (beatIndex % 2 === 0);
            let position;
            if (goingRight) {
                position = -swingRange + progress * 2 * swingRange;
            } else {
                position = swingRange - progress * 2 * swingRange;
            }

            const distFromEndpoint = Math.min(progress, 1 - progress);
            const nearEndpoint = distFromEndpoint < 0.05;
            const scale = nearEndpoint ? 1.15 : 1.0;

            beatDot.style.transform = `translateX(${position}px) scale(${scale})`;

            if (nearEndpoint) {
                beatDot.style.background = 'radial-gradient(circle at 32% 30%, #ff9e5e 0%, #ff6b35 45%, #e8572a 100%)';
                beatDot.style.boxShadow = `0 10px 28px rgba(255, 107, 53, 0.65), inset 0 -3px 8px rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255, 255, 255, 0.35)`;
            } else {
                beatDot.style.background = 'radial-gradient(circle at 32% 30%, #ffb366 0%, #f08838 45%, #d9702c 100%)';
                beatDot.style.boxShadow = `0 8px 22px rgba(217, 112, 44, 0.45), inset 0 -3px 8px rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255, 255, 255, 0.35)`;
            }

            requestAnimationFrame(visualLoop);
        }

        function startMetronome() {
            initAudio();
            isPlaying = true;
            currentBeat = 0;
            pendingBeats.length = 0;
            lastTriggeredBeat = -1;

            const startDelay = 0.05;
            nextNoteTime = audioCtx.currentTime + startDelay;
            visualStartTime = nextNoteTime - secondsPerBeat();

            btnToggle.textContent = '停 止';
            btnToggle.classList.add('playing');
            scheduler();
            requestAnimationFrame(visualLoop);
        }

        function stopMetronome() {
            isPlaying = false;
            if (schedulerTimer) {
                clearTimeout(schedulerTimer);
                schedulerTimer = null;
            }
            pendingBeats.length = 0;
            lastTriggeredBeat = -1;
            btnToggle.textContent = '开 始';
            btnToggle.classList.remove('playing');
            const swingRange = getSwingRange();
            beatDot.style.transform = `translateX(${-swingRange}px) scale(1)`;
            beatDot.style.background = 'radial-gradient(circle at 32% 30%, #ffb366 0%, #f08838 45%, #d9702c 100%)';
            beatDot.style.boxShadow = '0 8px 22px rgba(217, 112, 44, 0.45), inset 0 -3px 8px rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255, 255, 255, 0.35)';
        }

        function changeBPM(delta) {
            const newBpm = bpm + delta;
            if (newBpm >= MIN_BPM && newBpm <= MAX_BPM) {
                bpm = newBpm;
                updateBPMDisplay();
            }
        }

        btnMinus.addEventListener('click', () => changeBPM(-1));
        btnPlus.addEventListener('click', () => changeBPM(1));
        btnToggle.addEventListener('click', () => {
            if (isPlaying) {
                stopMetronome();
            } else {
                startMetronome();
            }
        });

        let pressTimer = null;
        let pressInterval = null;

        function startPress(delta) {
            changeBPM(delta);
            pressTimer = setTimeout(() => {
                pressInterval = setInterval(() => changeBPM(delta), 60);
            }, 250);
        }

        function stopPress() {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
            if (pressInterval) {
                clearInterval(pressInterval);
                pressInterval = null;
            }
        }

        btnMinus.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startPress(-1);
        }, { passive: false });
        btnMinus.addEventListener('touchend', stopPress);
        btnMinus.addEventListener('touchcancel', stopPress);
        btnMinus.addEventListener('mousedown', () => startPress(-1));
        btnMinus.addEventListener('mouseup', stopPress);
        btnMinus.addEventListener('mouseleave', stopPress);

        btnPlus.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startPress(1);
        }, { passive: false });
        btnPlus.addEventListener('touchend', stopPress);
        btnPlus.addEventListener('touchcancel', stopPress);
        btnPlus.addEventListener('mousedown', () => startPress(1));
        btnPlus.addEventListener('mouseup', stopPress);
        btnPlus.addEventListener('mouseleave', stopPress);

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.code === 'Space') {
                e.preventDefault();
                btnToggle.click();
            } else if (e.code === 'ArrowUp' || e.code === 'ArrowRight') {
                changeBPM(1);
            } else if (e.code === 'ArrowDown' || e.code === 'ArrowLeft') {
                changeBPM(-1);
            }
        });

        function resetDotPosition() {
            const swingRange = getSwingRange();
            beatDot.style.transform = `translateX(${-swingRange}px) scale(1)`;
        }

        window.addEventListener('load', resetDotPosition);
        window.addEventListener('resize', () => {
            if (!isPlaying) resetDotPosition();
        });
    </script>
</body>
</html>
